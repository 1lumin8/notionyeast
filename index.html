<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Words of the Day</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="masthead">
      <nav class="topbar" aria-label="Site navigation">
        <a class="brand" href="#">
          <span>Words of the Day</span>
        </a>
        <div class="nav-actions">
          <div class="view-switch" aria-label="Page views">
            <button class="active" id="quotesViewBtn" type="button">Quotes</button>
            <button id="searchViewBtn" type="button">Search</button>
            <button id="savedViewBtn" type="button">Saved</button>
          </div>
          <span id="issueDate"></span>
          <button class="ghost-button" id="shuffleTop" type="button">Refresh issue</button>
        </div>
      </nav>

      <section class="hero">
        <div class="hero-copy">
          <div class="tabs" role="tablist" aria-label="Quote collections">
            <button class="active" id="jssTab" data-collection="jss" role="tab" aria-selected="true" type="button">
              JSS Quotes
            </button>
            <button id="heavenlyYeastTab" data-collection="heavenlyYeast" role="tab" aria-selected="false" type="button">
              Heavenly Yeast Quotes
            </button>
            <button id="bibleTab" data-collection="bible" role="tab" aria-selected="false" type="button">
              Bible Quotes
            </button>
          </div>
          <h1 id="pageTitle">JSS Quotes</h1>
          <div class="hero-actions">
            <button class="primary-button" id="generateBtn" type="button">Generate 5 quotes</button>
            <button class="secondary-button" id="copyBtn" type="button">Copy issue</button>
          </div>
        </div>
      </section>
    </header>

    <main>
      <div class="view-panel active" id="quotesView">
        <section class="issue-panel" aria-labelledby="issueTitle">
        <div class="issue-header">
          <div>
            <p class="eyebrow" id="issueEyebrow">Today's issue</p>
            <h2 id="issueTitle">Random JSS Quotes</h2>
          </div>
          <div class="issue-meta">
            <span id="categoryCount">0 categories</span>
            <span>5 quotes</span>
          </div>
        </div>

        <div class="quote-grid" id="quoteGrid" aria-live="polite"></div>
        </section>

        <aside class="category-strip is-collapsed" id="categoryStrip" aria-label="Available quote categories">
          <div class="category-strip-header">
            <div>
            <p class="eyebrow">Categories in the mix</p>
            <h2 id="sourceTitle">Dashboard sources</h2>
            </div>
            <button class="category-toggle" id="categoryToggle" type="button" aria-expanded="false" aria-controls="categoryPills">
              Show categories
            </button>
          </div>
          <div class="category-pills" id="categoryPills"></div>
        </aside>
      </div>

      <div class="view-panel" id="searchView">
        <section class="search-panel" id="searchPanel" aria-labelledby="searchTitle">
          <div class="saved-header">
            <div>
              <p class="eyebrow">Search</p>
              <h2 id="searchTitle">Search the quote database</h2>
            </div>
            <span class="search-count" id="searchCount">0 matches</span>
          </div>
          <form class="search-box" id="searchForm" role="search">
            <label for="searchInput">Words or phrases</label>
            <div class="search-row">
              <input id="searchInput" type="search" autocomplete="off" placeholder="Search words or phrases">
              <button class="secondary-button compact-button" id="clearSearchBtn" type="button" hidden>Clear</button>
            </div>
          </form>
          <div class="saved-list search-results" id="searchResults" hidden></div>
        </section>
      </div>

      <div class="view-panel" id="savedView">
        <section class="saved-panel saved-page" aria-labelledby="savedTitle">
        <div class="saved-header">
          <div>
            <p class="eyebrow">Saved</p>
            <h2 id="savedTitle">Saved quotes</h2>
          </div>
          <button class="secondary-button compact-button" id="clearSavedBtn" type="button">Clear saved</button>
        </div>
        <div class="saved-list" id="savedList"></div>
        </section>
      </div>
    </main>

    <template id="quoteTemplate">
      <article class="quote-card">
        <div class="quote-card-top">
          <span class="category"></span>
          <span class="source"></span>
          <button class="copy-quote" type="button" aria-label="Copy quote">Copy</button>
          <button class="save-quote" type="button" aria-label="Save quote">Save</button>
        </div>
        <blockquote></blockquote>
      </article>
    </template>

    <script src="script.js?v=30"></script>
  </body>
</html>
